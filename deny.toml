# deny.toml — cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/

[graph]
# All-features check is expensive; default-features-only is enough for P0.
all-features = false

[advisories]
# Pull the RustSec advisory database on every CI run.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
# Project is "MIT OR Apache-2.0" (Cargo.toml:6). Allow the same plus the
# usual direct/indirect dependency licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",        # adler, etc.
    "0BSD",
]
confidence-threshold = 0.8

[bans]
# Wildcard bans across the dependency graph.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
# Allow the `wasi-delegate` feature stub (Cargo.toml:39-43) — it's a
# future hook, deliberately off in P0. Listed in skip so a future
# audit doesn't flag it.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []