[package]
name         = "edge-libos"
version      = "0.1.0"
edition      = "2021"
rust-version = "1.93"
license      = "MIT OR Apache-2.0"
description  = "Linux-personality libOS kernel for CPython/FastAPI on Wasmtime"

[lib]
name = "edge_libos"
path = "src/lib.rs"

[[bin]]
name = "edge-python"
path = "src/bin/edge_python.rs"

[[bin]]
name = "trace-host"
path = "src/bin/trace_host.rs"

[dependencies]
wasmtime             = { version = "=45.0.3", features = ["component-model", "async", "anyhow"] }
tokio                = { version = "1.45", features = ["full"] }
futures              = "0.3"
anyhow               = "1"
thiserror            = "2"
tracing              = "0.1"
tracing-subscriber   = { version = "0.3", features = ["env-filter"] }
parking_lot          = "0.12"
rand                 = { version = "0.8", features = ["small_rng"] }
once_cell            = "1"
chrono               = { version = "0.4", default-features = false, features = ["clock"] }

[dev-dependencies]
wat        = "1"
tempfile   = "3"
pretty_assertions = "1"

[features]
default = []
# Future: turn on to delegate to wasmtime-wasi instead of the hand-rolled VFS.
# P0 deliberately leaves this OFF (see impelementationplan §0 and decision log).
wasi-delegate = []

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1
