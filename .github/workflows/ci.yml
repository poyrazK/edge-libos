# GitHub Actions CI for edge-libos.
#
# The whole dependency graph (wasmtime + cranelift + tokio-full, ~217 crates)
# is expensive to compile, so the ONLY goal of this file is: compile it as few
# times as possible, as cheaply as possible.
#
# Key decisions:
#   - CI compiles under the `ci` cargo profile (Cargo.toml), NOT `release`.
#     `release` is opt3 + thin-LTO + codegen-units=1 + panic=abort — tuned for
#     production. `ci` drops LTO, uses codegen-units=256, and panic=unwind so
#     that `cargo build` and `cargo test` share ONE dependency compile instead
#     of the abort/unwind double-compile `release` forces.
#   - Exactly one job runs cargo: `build`. The fan-out children consume its
#     uploaded binaries. They must NOT invoke cargo (they have no cache) — the
#     cosmetic `cargo test --list` counters are disabled via SKIP_TEST_COUNT /
#     SKIP_TEST_TOTALS / SKIP_DOD_SMOKE so they can't trigger a cold compile.
#   - `tools` is an independent toolchain/version smoke; nothing depends on it
#     (each runner reinstalls its own toolchain), so it never gates `build`.
#
# Job graph:
#
#   tools           (independent — verifies version pins)
#   build ──┬──▶ c-conformance   (zig cc + downloaded trace-host)
#           └──▶ reproduce       (integration scripts, cargo-free)
#
# Triggers: push to main, and pull_request against any branch.
#
# Required checks (branch protection): tools, build, c-conformance, reproduce.
# Local mirror: scripts/preflight.sh.
#
# This file is layered with 10 static-analysis linters (fmt, clippy, doc,
# deny, machete, NR-consistency, actionlint, shellcheck, gitleaks, wat2wasm
# validation) wired as additional steps inside the existing `tools` and
# `build` jobs — see the "Why linters live inside build / tools" section
# in docs/branch-protection.md for the rationale (fan-out jobs must NOT
# invoke cargo because they have no warm `target/ci/` cache).

name: verify

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs so we don't burn minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ZIG_VERSION: "0.16.0"
  CARGO_TERM_COLOR: always

jobs:
  # ─── Toolchain/version smoke (independent; gates nothing) ──────────
  # Verifies the pinned toolchains actually resolve/download. Installs
  # don't cross runners, so this job feeds no other job — it just fails
  # fast and loud if a version pin rots.
  tools:
    name: toolchain + version pins
    runs-on: ubuntu-22.04
    # Bumped 6 -> 8 to absorb the four new static-analysis steps added in
    # commit 8 (actionlint, shellcheck, gitleaks, wat2wasm validation).
    timeout-minutes: 8

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: 3. Install zig 0.16.0 via release tarball
        # apt-get's zig on Ubuntu 22.04 is 0.10 — not sufficient for the
        # zig cc-based C conformance runner. Tarball name is
        # `zig-x86_64-linux-<ver>.tar.xz` (NOT `zig-linux-x86_64-<ver>` —
        # that URL 404s). Verified via ziglang.org/download/index.json.
        run: |
          set -euo pipefail
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -fSL --retry 3 -o /tmp/zig.tar.xz "$ZIG_URL"
          sudo mkdir -p /opt/zig
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          rm -f /tmp/zig.tar.xz
          /opt/zig/zig version

      - name: 4. Verify wabt + strace install
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wabt strace
          wat2wasm --version
          strace --version 2>&1 | head -1

  # ─── The ONLY job that runs cargo ──────────────────────────────────
  # Compiles once under the `ci` profile, runs the full Rust suite, and
  # uploads the two binaries the fan-out children need. `cargo test`
  # already builds trace-host/edge-python (via CARGO_BIN_EXE), so the
  # explicit `cargo build` step is a near-instant no-op that just makes
  # the artifact paths obvious.
  build:
    name: cargo build + test (single ci-profile compile)
    runs-on: ubuntu-22.04
    # Bumped 12 -> 18 to absorb the cargo-side linters added in
    # commits 4-7 (NR-consistency, fmt, clippy, doc, deny, machete).
    # They all share `build`'s warm `target/ci/` cache; marginal cost is
    # ~30-60 s on warm cache, ~3-6 min on cold.
    timeout-minutes: 18

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: 3. Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            target

      - name: 4. cargo test --profile ci (full Rust suite, one compile)
        # Compiles the whole graph ONCE (unwind + no LTO). Includes the
        # strace_baseline_diff and edge_python_* integration tests, so
        # they don't need separate invocations.
        run: |
          set -euo pipefail
          cargo test --profile ci

      - name: 5. cargo build --profile ci binaries (reuses step 4)
        run: |
          set -euo pipefail
          cargo build --profile ci --bin trace-host --bin edge-python
          # Publish under target/release/ so downstream scripts/artifacts
          # keep their conventional paths regardless of the CI profile dir.
          mkdir -p target/release
          cp target/ci/trace-host target/ci/edge-python target/release/
          ls -la target/release/trace-host target/release/edge-python

      - name: 6. Upload binaries (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/trace-host
            target/release/edge-python
          retention-days: 7
          if-no-files-found: error

  # ─── Marker-enforced C conformance (cargo-free) ────────────────────
  c-conformance:
    name: C conformance (marker-enforced, CI gate)
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 8

    env:
      # Prevent runner.sh's cosmetic test-count from shelling out to
      # `cargo test --list` (a full uncached compile in this cargo-free job).
      SKIP_TEST_COUNT: "1"

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install zig 0.16.0 via release tarball
        run: |
          set -euo pipefail
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          sudo mkdir -p /opt/zig
          curl -fSL --retry 3 -o /tmp/zig.tar.xz "$ZIG_URL"
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" | sudo tee -a "$GITHUB_PATH" >/dev/null
          rm -f /tmp/zig.tar.xz
          /opt/zig/zig version

      - name: 3. Install wabt (for wat2wasm)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wabt
          wat2wasm --version

      - name: 4. Download binaries (trace-host)
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/release

      - name: 5. C conformance (marker-enforced)
        # The gating step. A single failed C test fails CI. Runs the
        # downloaded trace-host on zig cc-compiled .wasm; no cargo.
        run: |
          set -euo pipefail
          chmod +x target/release/trace-host
          ls -la target/release/trace-host
          bash tests/conformance/runner.sh

  # ─── reproduce_dod.sh integration (cargo-free) ─────────────────────
  reproduce:
    name: reproduce_dod.sh (fan-out mode)
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 8

    env:
      # `build` already did all the cargo work. Skip every step in
      # reproduce_dod.sh that would re-invoke cargo (all uncached here):
      SKIP_DEV_SETUP: "1"     # tools smoke already covers toolchain
      SKIP_BUILD: "1"         # build job already built
      SKIP_RUST_TEST: "1"     # build job already ran the full suite
      SKIP_C_CONFORMANCE: "1" # c-conformance job owns the C gate
      SKIP_STRACE_DIFF: "1"   # covered by build's `cargo test`
      SKIP_DOD_SMOKE: "1"     # edge_python_* smoke already in build's suite
      SKIP_TEST_TOTALS: "1"   # count_tests.sh would `cargo test --list`

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install strace (for any post-check scripts)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq strace
          strace --version 2>&1 | head -1

      - name: 3. Download binaries (trace-host + edge-python)
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/release

      - name: 4. Run scripts/reproduce_dod.sh (skips all cargo work)
        run: |
          set -uo pipefail
          chmod +x target/release/trace-host target/release/edge-python
          ls -la target/release/
          bash scripts/reproduce_dod.sh
