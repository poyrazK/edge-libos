# GitHub Actions CI for edge-libos.
#
# 4 parallel jobs (build → 3 fans) — replaces the previous single 14-step
# job. Wall-clock target: 4-5 min vs ~13 min before.
#
# Job graph:
#
#   tools ──▶ build ──┬──▶ rust-tests
#                     ├──▶ c-tests
#                     └──▶ reproduce
#
# All jobs run on ubuntu-22.04.
#
# Triggers:
#   - push to main
#   - pull_request against any branch
#
# Required checks (set in docs/branch-protection.md):
#   - tools        : checkpoint + toolchain install + caches
#   - build        : cargo build --release, uploads release binaries
#   - rust-tests   : cargo test --release (full Rust suite)
#   - c-tests      : marker-enforced C conformance via zig cc
#   - reproduce    : reproduce_dod.sh in CI fan-out mode (skips work
#                    the other jobs already covered)
#
# Local mirror: scripts/preflight.sh — but preflight runs the whole suite
# sequentially (no fan-out); the workflow and preflight share CI-1's
# setup steps exactly, then diverge only in job structure.
#
# Decisions (P2-CI-1 + P2-CI-2):
#   - ubuntu-22.04 only (per user choice; AF_UNIX macOS would double minutes)
#   - Aggressive caching on Cargo.lock (per user choice)
#   - 5 env SKIP_* hooks in reproduce_dod.sh let the parallel jobs not
#     duplicate cargo test / c conformance / strace diff (per user choice)
#   - Skip CPython steps in reproduce until A6 lands (per user choice)

name: verify

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs so we don't burn minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No permissions are needed beyond the defaults for these jobs.
permissions:
  contents: read

# Shared environment + version pins. Every job inherits these.
env:
  ZIG_VERSION: "0.16.0"
  CARGO_TERM_COLOR: always

jobs:
  # ─── Stage 1: prepare the toolchain ────────────────────────────────
  tools:
    name: toolchain + caches
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: 3. Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            target

      - name: 4. Pre-warm wasm32-unknown-linux-musl target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target/wasm32-unknown-linux-musl
          cache-on-failure: true

      - name: 5. Install zig 0.16.0 via release tarball
        # apt-get's zig on Ubuntu 22.04 is 0.10 — not sufficient for the
        # zig cc-based C conformance runner. scripts/dev_setup.sh flags this.
        # Tarball name is `zig-x86_64-linux-<ver>.tar.xz` (NOT
        # `zig-linux-x86_64-<ver>.tar.xz` — that URL 404s). Verified via
        # https://ziglang.org/download/index.json on 2026-07-13.
        # Use the absolute /opt/zig path for THIS step's verification, and
        # also export PATH + persist GITHUB_PATH for subsequent steps.
        run: |
          set -euo pipefail
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "Downloading $ZIG_URL"
          curl -fSL --retry 3 -o /tmp/zig.tar.xz "$ZIG_URL"
          sudo mkdir -p /opt/zig
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" | sudo tee /etc/ld.so.conf.d/zig.conf >/dev/null
          sudo ldconfig
          echo "/opt/zig" | sudo tee -a "$GITHUB_PATH" >/dev/null
          rm -f /tmp/zig.tar.xz
          /opt/zig/zig version

      - name: 6. Install wabt (wat2wasm)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wabt
          wat2wasm --version

      - name: 7. Install strace
        run: |
          set -euo pipefail
          sudo apt-get install -y -qq strace
          strace --version 2>&1 | head -1

  # ─── Stage 2: build release binaries + upload artifacts ────────────
  build:
    name: cargo build --release (binaries)
    runs-on: ubuntu-22.04
    needs: tools
    timeout-minutes: 12

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: 3. Cache cargo registry + target (build shares cache key)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true
          cache-directories: |
            ~/.cargo/registry
            ~/.cargo/git
            target

      - name: 4. cargo build --release trace-host + edge-python
        run: |
          set -euo pipefail
          cargo build --release --bin trace-host --bin edge-python
          ls -la target/release/trace-host target/release/edge-python
          file target/release/trace-host

      - name: 5. Upload release binaries (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/trace-host
            target/release/edge-python
          retention-days: 7
          if-no-files-found: error

  # ─── Stage 3a: full Rust test suite ────────────────────────────────
  rust-tests:
    name: cargo test --release
    runs-on: ubuntu-22.04
    needs: tools  # uses toolchain + cargo cache; binaries fetched separately
    timeout-minutes: 12

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: 3. Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true

      - name: 4. Run all Rust tests
        run: |
          set -euo pipefail
          cargo test --release

  # ─── Stage 3b: marker-enforced C conformance ───────────────────────
  c-tests:
    name: C conformance (marker-enforced, CI gate)
    runs-on: ubuntu-22.04
    needs: [tools, build]   # needs zig (tools) AND trace-host (build)
    timeout-minutes: 8

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: 3. Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true

      - name: 4. Reinstall zig 0.16.0 (each job gets its own runner)
        run: |
          set -euo pipefail
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          sudo mkdir -p /opt/zig
          curl -fSL --retry 3 -o /tmp/zig.tar.xz "$ZIG_URL"
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" | sudo tee /etc/ld.so.conf.d/zig.conf >/dev/null
          sudo ldconfig
          echo "/opt/zig" | sudo tee -a "$GITHUB_PATH" >/dev/null
          rm -f /tmp/zig.tar.xz
          /opt/zig/zig version

      - name: 5. Install wabt (for wat2wasm; C runner may compile .wat)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq wabt
          wat2wasm --version

      - name: 6. Download release binaries (trace-host)
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/release

      - name: 7. C conformance (marker-enforced)
        # This is the gating step. A single failed C test fails CI.
        run: |
          set -euo pipefail
          ls -la target/release/trace-host
          bash tests/conformance/runner.sh

  # ─── Stage 3c: full reproduce_dod.sh (with skips for parallel work) ─
  reproduce:
    name: reproduce_dod.sh (fan-out mode)
    runs-on: ubuntu-22.04
    needs: [tools, build]
    timeout-minutes: 12

    env:
      # The parallel jobs (rust-tests, c-tests) already covered cargo test
      # and the C conformance gate. Skip those steps inside reproduce_dod.sh
      # so it can focus on the integration pieces (dev_setup, guest build,
      # DoD smoke tests, count totals).
      SKIP_DEV_SETUP: "1"     # tools job already installed everything
      SKIP_BUILD: "1"         # build job already built
      SKIP_RUST_TEST: "1"     # rust-tests job already ran cargo test
      SKIP_C_CONFORMANCE: "1" # c-tests job already ran the C runner
      SKIP_STRACE_DIFF: "1"   # optional extra; uncomment if you want it back

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: 2. Install Rust toolchain (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: 3. Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ github.workspace }} -> target
          cache-on-failure: true

      - name: 4. Install strace (used by some baseline diff scripts)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq strace
          strace --version 2>&1 | head -1

      - name: 5. Download release binaries (trace-host + edge-python)
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/release

      - name: 6. Run scripts/reproduce_dod.sh (skips parallel work)
        run: |
          set -uo pipefail
          ls -la target/release/
          bash scripts/reproduce_dod.sh
